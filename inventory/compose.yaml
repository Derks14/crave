services:
  mysql:
    image: mysql:8.3.0
    container_name: mysql2
    environment:
      MYSQL_DATABASE: inventory_service
      MYSQL_ROOT_PASSWORD: mysql
    ports:
      - "3306:3306"
    volumes:
      - ./mysql:/var/lib/mysql
      - ./docker/mysql/init.sql:/docker-entrypoint-initdb.d/init.sql

