spring.application.name=notification-service
server.port=8083
#kafka consumer properties

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=notification-service
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
#spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.value-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer

spring.kafka.consumer.properties.schema.registry.url=http://127.0.0.1:8085
spring.kafka.consumer.properties.specific.avro.reader=true

# Disable devtools restart to avoid Kafka/Avro classloader mismatches.

#spring.kafka.consumer.properties.spring.json.type.mapping=event:order.event.OrderPlacedEvent
#spring.kafka.consumer.properties.spring.json.trusted.packages=*
#spring.kafka.consumer.properties.spring.json.value.default.type=order.event.OrderPlacedEvent

spring.kafka.consumer.auto-offset-reset=earliest
