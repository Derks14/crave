spring.application.name=api-gateway
server.port=9000


spring.security.oauth2.resourceserver.jwt.issuer-uri=http://localhost:8181/realms/crave


# setup
# define the urls here as though you implementing it for
springdoc.swagger-ui.enabled=true
springdoc.api-docs.enabled=true

springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

springdoc.swagger-ui.urls[0].name=food-service-docs
springdoc.swagger-ui.urls[0].url=/aggregate/food/api-docs

springdoc.swagger-ui.urls[1].name=order-service-docs
springdoc.swagger-ui.urls[1].url=/aggregate/order/api-docs

springdoc.swagger-ui.urls[2].name=inventory-service-docs
springdoc.swagger-ui.urls[2].url=/aggregate/inventory/api-docs




# resilence4j properties
resilience4j.circuitbreaker.configs.default.register-health-indicator=true
resilience4j.circuitbreaker.configs.default.sliding-window-type=COUNT_BASED
resilience4j.circuitbreaker.configs.default.sliding-window-size=10
resilience4j.circuitbreaker.configs.default.failure-rate-threshold=50
resilience4j.circuitbreaker.configs.default.wait-duration-in-open-state=5s
resilience4j.circuitbreaker.configs.default.permitted-number-of-calls-in-half-open-state=3
resilience4j.circuitbreaker.configs.default.automatic-transition-from-open-to-half-open-enabled=true
resilience4j.circuitbreaker.configs.default.minimum-number-of-calls=5


resilience4j.timelimiter.configs.default.timeout-duration.seconds=3

# this config enables us to implement retry logics instead of opening the circuit breaker
#resilience4j.retry.configs.default.max-attempts=3
#resilience4j.retry.configs.default.wait-duration.seconds=2
